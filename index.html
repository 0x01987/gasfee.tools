<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gas Fee Estimator</title>
<meta name="description" content="Live EVM Gas Fee Estimator. Slow, Standard, Fast. Runs locally in your browser." />
<meta name="robots" content="index,follow" />

<style>
:root{
  --bg:#0b0f14;
  --card:#111826;
  --card2:#0f1623;
  --text:#e8eef7;
  --muted:#a6b1c2;
  --line:#223047;
  --accent:#4cc3ff;
  --good:#34d399;
  font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);}

.wrap{max-width:980px;margin:auto;padding:24px 16px 50px;}

h1{margin:0;font-size:22px}
.sub{color:var(--muted);font-size:13px;margin-top:4px}

.panel{
  background:linear-gradient(180deg,var(--card),var(--card2));
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px;
  margin-top:16px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
@media(max-width:820px){
  .row{grid-template-columns:1fr}
}

label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}

select,input,button{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#0b1220;
  color:var(--text);
}

button{
  cursor:pointer;
  background:linear-gradient(135deg,var(--accent),#7c5cff);
  border:none;
  font-weight:bold;
  color:#081018;
}

.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:16px;
}
@media(max-width:820px){
  .cards{grid-template-columns:1fr}
}

.card{
  background:#0b1220;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
}

.tier{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-weight:bold;
}

.kv{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin:6px 0;
  color:var(--muted);
}

.big{
  font-size:22px;
  font-weight:900;
  margin-top:8px;
  color:var(--good);
  text-shadow:0 0 8px rgba(52,211,153,0.6);
}

.mono{font-family:monospace}
.foot{font-size:12px;color:var(--muted);margin-top:8px}
</style>
</head>

<body>
<div class="wrap">

<h1>Gas Fee Estimator</h1>
<div class="sub">Live Slow / Standard / Fast estimates (EIP-1559)</div>

<div class="panel">
  <div class="row">
    <div>
      <label>Network</label>
      <select id="network"></select>
    </div>
    <div>
      <label>Gas Units</label>
      <input id="gasUnits" type="number" value="21000"/>
    </div>
  </div>
  <div style="margin-top:12px">
    <button onclick="refresh()">Refresh</button>
  </div>
</div>

<div class="cards">

  <div class="card">
    <div class="tier">Slow <span>Budget</span></div>
    <div class="kv"><span>Max Fee</span><span class="mono" id="slowMax">—</span></div>
    <div class="kv"><span>Priority</span><span class="mono" id="slowTip">—</span></div>
    <div class="big mono" id="slowTotal">—</div>
  </div>

  <div class="card">
    <div class="tier">Standard <span>Recommended</span></div>
    <div class="kv"><span>Max Fee</span><span class="mono" id="stdMax">—</span></div>
    <div class="kv"><span>Priority</span><span class="mono" id="stdTip">—</span></div>
    <div class="big mono" id="stdTotal">—</div>
  </div>

  <div class="card">
    <div class="tier">Fast <span>High Priority</span></div>
    <div class="kv"><span>Max Fee</span><span class="mono" id="fastMax">—</span></div>
    <div class="kv"><span>Priority</span><span class="mono" id="fastTip">—</span></div>
    <div class="big mono" id="fastTotal">—</div>
  </div>

</div>

<div class="foot">
Uses eth_feeHistory. Falls back to eth_gasPrice if needed.
</div>

</div>

<script>
const NETWORKS = [
  {key:"eth", name:"Ethereum", symbol:"ETH", rpc:"https://cloudflare-eth.com"},
  {key:"arb", name:"Arbitrum", symbol:"ETH", rpc:"https://arb1.arbitrum.io/rpc"},
  {key:"op", name:"Optimism", symbol:"ETH", rpc:"https://mainnet.optimism.io"},
  {key:"base", name:"Base", symbol:"ETH", rpc:"https://mainnet.base.org"},
  {key:"poly", name:"Polygon", symbol:"POL", rpc:"https://rpc.ankr.com/polygon"}
];

const networkSelect = document.getElementById("network");
NETWORKS.forEach(n=>{
  const opt=document.createElement("option");
  opt.value=n.key;
  opt.innerText=n.name;
  networkSelect.appendChild(opt);
});
networkSelect.value="eth";

async function rpcCall(url, method, params){
  const res = await fetch(url,{
    method:"POST",
    headers:{"content-type":"application/json"},
    body:JSON.stringify({
      jsonrpc:"2.0",
      id:1,
      method,
      params
    })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.result;
}

async function refresh(){
  const net = NETWORKS.find(n=>n.key===networkSelect.value);
  const gasUnits = BigInt(document.getElementById("gasUnits").value || 21000);

  try{
    const fh = await rpcCall(net.rpc,"eth_feeHistory",["0x14","latest",[10,50,90]]);
    const base = BigInt(fh.baseFeePerGas.slice(-1)[0]);

    const rewards = fh.reward.map(r=>r.map(x=>BigInt(x)));
    const p10 = rewards.map(r=>r[0]);
    const p50 = rewards.map(r=>r[1]);
    const p90 = rewards.map(r=>r[2]);

    function median(arr){
      const sorted=[...arr].sort((a,b)=>a<b?-1:1);
      return sorted[Math.floor(sorted.length/2)];
    }

    const tipSlow = median(p10);
    const tipStd = median(p50);
    const tipFast = median(p90);

    function calc(tip){
      const max = base*2n + tip;
      const totalWei = gasUnits * max;
      const gwei = Number(max)/1e9;
      const totalNative = Number(totalWei)/1e18;
      return {gwei:gwei.toFixed(2)+" gwei", total: totalNative.toPrecision(5)+" "+net.symbol};
    }

    const slow = calc(tipSlow);
    const std = calc(tipStd);
    const fast = calc(tipFast);

    document.getElementById("slowMax").innerText=slow.gwei;
    document.getElementById("stdMax").innerText=std.gwei;
    document.getElementById("fastMax").innerText=fast.gwei;

    document.getElementById("slowTip").innerText=(Number(tipSlow)/1e9).toFixed(2)+" gwei";
    document.getElementById("stdTip").innerText=(Number(tipStd)/1e9).toFixed(2)+" gwei";
    document.getElementById("fastTip").innerText=(Number(tipFast)/1e9).toFixed(2)+" gwei";

    document.getElementById("slowTotal").innerText=slow.total;
    document.getElementById("stdTotal").innerText=std.total;
    document.getElementById("fastTotal").innerText=fast.total;

  }catch(e){
    alert("RPC Error: "+e.message);
  }
}

refresh();
</script>

</body>
</html>
